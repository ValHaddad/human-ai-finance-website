<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paper Review — Human × AI Finance 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- jsPsych v8 core -->
  <script src="https://unpkg.com/jspsych@8.2.3/dist/index.browser.min.js"></script>
  <link  href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" />

  <!-- Plugins -->

  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0/dist/index.browser.min.js"></script>
  <link  href="https://unpkg.com/@jspsych/plugin-survey@4.0.0/css/survey.css" rel="stylesheet" />

  <!--
    Single stylesheet — loaded AFTER survey.css so overrides win specificity.
    All SurveyJS customisations live here in one place.
  -->
  <style>
    /* ── Theme tokens (matched to website style.css) ──── */
    :root {
      --brand:       #2774AE;          /* UCLA Blue */
      --brand-dark:  #003B5C;          /* UCLA Darkest Blue */
      --brand-mid:   #005587;          /* UCLA Darker Blue */
      --accent:      #FFD100;          /* UCLA Gold */
      --accent-dark: #E6BC00;          /* Gold hover */
      --text:        #1a1a1a;
      --text-muted:  #555;
      --radius:      6px;
      --card-max:    700px;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Base ──────────────────────────────────────────── */
    body { margin: 0; padding: 0; font-family: var(--font); color: var(--text); line-height: 1.7; font-size: 17px; }
    .jspsych-display-element { font-size: 17px; line-height: 1.7; }
    .jspsych-content-wrapper { text-align: center; }
    .jspsych-content { width: 100%; }

    /* ── jsPsych button (thank-you page) ───────────────── */
    .jspsych-btn {
      background: var(--accent) !important; color: var(--brand-dark) !important;
      border: none !important; border-radius: var(--radius) !important;
      padding: 12px 32px !important; font: 700 1rem var(--font) !important;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .jspsych-btn:hover { background: var(--accent-dark) !important; transform: translateY(-1px); }

    /* ── SurveyJS: layout ──────────────────────────────── */
    .sd-body.sd-body--static {
      max-width: 1100px !important;
      padding: 24px 24px 32px !important;
    }
    .sd-body__page, .sd-page, .sd-row, .sd-row > div,
    .sd-element, .sd-question, .sd-element--complex,
    .sd-question--table { max-width: 100% !important; }
    .sd-question__content { overflow-x: auto !important; max-width: 100% !important; padding-top: 6px !important; }

    /* ── SurveyJS: section header ──────────────────────── */
    .sd-header { padding-bottom: 12px !important; }
    .sd-header__text { text-align: center !important; }
    .sd-header__text h3 { font-family: var(--font); color: var(--brand); font-weight: 700; }
    .sd-description {
      text-align: center !important;
      max-width: var(--card-max); margin: 0 auto !important;
    }

    /* ── SurveyJS: buttons ─────────────────────────────── */
    .sd-btn, .sd-navigation__complete-btn, .sd-btn--action {
      background: var(--accent) !important; color: var(--brand-dark) !important;
      border-radius: var(--radius) !important;
      font-weight: 700 !important; padding: 12px 32px !important;
      font-size: 1rem !important; transition: background 0.2s, transform 0.1s;
    }
    .sd-btn:hover, .sd-navigation__complete-btn:hover { background: var(--accent-dark) !important; transform: translateY(-1px); }
    .sd-action-bar { justify-content: center !important; }

    /* ── SurveyJS: question cards ──────────────────────── */
    .sd-element--with-frame {
      max-width: var(--card-max) !important;
      margin-left: auto !important; margin-right: auto !important;
      padding: 18px 22px !important;
    }
    .sd-element--with-frame.sd-question--table { max-width: 100% !important; }
    .sd-element--with-frame.sd-question--table:has(.sd-matrixdynamic) {
      max-width: var(--card-max) !important;
    }
    .sd-element--complex.sd-element--with-frame > .sd-element__header {
      padding: 12px 0 !important; margin-bottom: 8px !important;
    }
    .sd-row { margin-top: 10px !important; }
    .sd-page > .sd-row:first-child { margin-top: 0 !important; }

    /* ── SurveyJS: radio / checkbox lists ──────────────── */
    .sd-selectbase { gap: 2px !important; }
    .sd-item { padding: 5px 0 !important; }

    /* ── SurveyJS: rating items ──────────────────────── */
    .sd-rating { justify-content: center !important; }

    /* ── Consent header ────────────────────────────────── */
    .consent-header {
      max-width: 680px; margin: 0 auto 8px; text-align: left; line-height: 1.5;
    }
    .consent-header .ch-center {
      text-align: center; margin-bottom: 24px;
      background: linear-gradient(160deg, var(--brand-dark) 0%, var(--brand-mid) 40%, var(--brand) 100%);
      padding: 32px 24px 24px; border-radius: var(--radius);
    }
    .consent-header .ucla-logo {
      height: 48px; width: auto; display: block; margin: 0 auto 16px;
    }
    .consent-header h1 { font-size: 1.55em; margin: 0 0 4px; letter-spacing: -0.01em; color: #fff; }
    .consent-header h2 { font-size: 1.1em; font-weight: 600; margin: 0; color: rgba(255,255,255,0.9); }
    .consent-header p { margin: 12px 0; }
    .consent-header a { color: var(--brand); }

    /* ── Consent checkboxes ─────────────────────────────── */
    [data-name="consent_agree"] .sd-question__header { display: none !important; }
    [data-name="consent_agree"] .sd-selectbase__label::after {
      content: " *"; color: #e60a3e; font-weight: 600;
    }

    /* ── Scale anchors legend ─────────────────────────── */
    .scale-anchors {
      max-width: var(--card-max);
      margin: 0 auto 8px;
      background: #f0f6fb;
      border-left: 4px solid var(--brand);
      padding: 12px 16px;
      border-radius: 0 var(--radius) var(--radius) 0;
      text-align: left;
      font-size: 0.88em;
      line-height: 1.6;
    }
    .scale-anchors strong { color: var(--brand-dark); }

    /* ── Thank-you page ────────────────────────────────── */
    .debrief {
      max-width: 640px; margin: 0 auto; text-align: left;
      line-height: 1.65; padding: 40px 24px; font-family: var(--font);
    }
    .debrief h2 { text-align: center; font-size: 1.6em; margin-bottom: 24px; }
    .debrief .footer {
      margin-top: 36px; padding-top: 20px;
      border-top: 3px solid var(--accent); color: var(--text-muted); font-size: 0.92em;
    }
    .debrief a { color: var(--brand); }
    .finalize-instruction {
      color: var(--brand-dark); font-weight: 700; font-size: 1.05em;
      text-align: center; margin-top: 28px;
    }

    /* ── Submitting / confirmation states ─────────────── */
    .submission-status {
      max-width: 640px; margin: 0 auto; text-align: center;
      padding: 60px 24px; font-family: var(--font); line-height: 1.7;
    }
    .submission-status h2 { font-size: 1.6em; margin-bottom: 16px; }
    .submission-spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 4px solid #ddd; border-top-color: var(--brand);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .submission-success h2 { color: #2e7d32; }
    .submission-success .checkmark { font-size: 3em; color: #2e7d32; margin-bottom: 12px; }
    .submission-error h2 { color: #C41E3A; }
    .submission-error .error-icon { font-size: 3em; color: #C41E3A; margin-bottom: 12px; }
  </style>
</head>

<body></body>

<script>
// ─── Session & demo mode ─────────────────────────────────
const SESSION_ID = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const DEMO = new URLSearchParams(window.location.search).has("demo");


// ─── Upload configuration ────────────────────────────────
const DATAPIPE_EXPERIMENT_ID = "IR4h0gyel9KA";
const DATAPIPE_DATA_URL = "https://pipe.jspsych.org/api/data/";
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwppcJYu4V8KEh727rsxwpDvcccUYwIGE9rRcvejHGCfzebUq5741PwgLdXaumAd0tT/exec";
const UPLOAD_TIMEOUT_MS = 300000; // 5 minutes

// ─── Retry helper ────────────────────────────────────────
async function withRetry(fn, maxRetries = 3) {
  for (let attempt = 0; attempt < maxRetries; attempt++) {
    try {
      return await fn();
    } catch (err) {
      console.warn(`[Upload] Attempt ${attempt + 1} failed:`, err.message);
      if (attempt === maxRetries - 1) throw err;
      await new Promise(r => setTimeout(r, 1000 * Math.pow(3, attempt)));
    }
  }
}

// ─── Fetch with timeout ──────────────────────────────────
function fetchWithTimeout(url, options, timeoutMs = UPLOAD_TIMEOUT_MS) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...options, signal: controller.signal })
    .finally(() => clearTimeout(timeout));
}

// ─── DataPipe helper (with response validation) ──────────
async function sendToDataPipe(filename, data) {
  const response = await fetchWithTimeout(DATAPIPE_DATA_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "*/*" },
    body: JSON.stringify({
      experimentID: DATAPIPE_EXPERIMENT_ID,
      filename: filename,
      data: data,
    }),
  });
  if (!response.ok) throw new Error(`DataPipe HTTP ${response.status} for ${filename}`);
  const json = await response.json();
  if (json.error) throw new Error(`DataPipe error for ${filename}: ${json.error}`);
  console.log(`[DataPipe] ${filename} response:`, json);
  return json;
}

// ─── Google Drive helper ─────────────────────────────────
async function sendToGoogleDrive(filename, data, contentType) {
  const response = await fetchWithTimeout(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    redirect: "follow",
    body: JSON.stringify({
      action: "data",
      filename: filename,
      data: data,
      contentType: contentType || "application/json",
    }),
  });
  if (response.status === 0 || response.type === "opaque") {
    console.log(`[GoogleDrive] ${filename}: opaque response (likely succeeded)`);
    return { success: true, filename };
  }
  if (!response.ok) throw new Error(`Google Drive HTTP ${response.status} for ${filename}`);
  const text = await response.text();
  try {
    const json = JSON.parse(text);
    if (!json.success) throw new Error(`Google Drive error for ${filename}: ${json.error || "unknown"}`);
    console.log(`[GoogleDrive] ${filename} response:`, json);
    return json;
  } catch (e) {
    console.log(`[GoogleDrive] ${filename}: non-JSON response, treating as success`);
    return { success: true, filename };
  }
}

// ─── Dual-save: send to both, succeed if either works ────
async function dualSaveData(filename, data, contentType) {
  const results = await Promise.allSettled([
    withRetry(() => sendToDataPipe(filename, data)),
    withRetry(() => sendToGoogleDrive(filename, data, contentType)),
  ]);
  const dpOk = results[0].status === "fulfilled";
  const gdOk = results[1].status === "fulfilled";
  if (!dpOk) console.error(`[DualSave] DataPipe failed for ${filename}:`, results[0].reason?.message);
  if (!gdOk) console.error(`[DualSave] GoogleDrive failed for ${filename}:`, results[1].reason?.message);
  if (!dpOk && !gdOk) throw new Error(`Both destinations failed for ${filename}`);
  return { filename, datapipe: dpOk, googledrive: gdOk };
}

// ─── jsPsych init ────────────────────────────────────────

const jsPsych = initJsPsych({
  show_progress_bar: false,
  async on_finish() {
    const ts   = new Date().toISOString().replace(/[:.]/g, "-");
    const base = `review_${ts}_${SESSION_ID}`;

    console.log("[DataPipe] Review session:", base);

    // localStorage backup
    const backupKey = `hxai_review_${SESSION_ID}`;
    try {
      localStorage.setItem(backupKey, JSON.stringify({
        session: base,
        timestamp: new Date().toISOString(),
        csv: jsPsych.data.get().csv(),
        json: jsPsych.data.get().json(),
      }));
      console.log("[Backup] Review data saved to localStorage");
    } catch (e) {
      console.warn("[Backup] localStorage save failed:", e.message);
    }

    // Show loading state
    const display = document.querySelector('.jspsych-content');
    display.innerHTML = `
      <div class="submission-status">
        <div class="submission-spinner"></div>
        <h2>Submitting Your Review&hellip;</h2>
        <p>Please wait. Do not close this tab.</p>
      </div>
    `;

    try {
      await Promise.all([
        dualSaveData(`${base}.csv`, jsPsych.data.get().csv(), "text/csv"),
        dualSaveData(`${base}.json`, jsPsych.data.get().json(), "application/json"),
      ]);

      // Clear backup on success
      try { localStorage.removeItem(backupKey); } catch (e) { /* ignore */ }

      display.innerHTML = `
        <div class="submission-status submission-success">
          <div class="checkmark">&#10003;</div>
          <h2>Review Submitted</h2>
          <p>Thank you for submitting your review.</p>
          <p>If you have more papers to review, please <strong>reload this page</strong> to start the next review.</p>
          <p style="margin-top:28px; color:#555;">You may now close this tab.</p>
          <div style="margin-top:36px; padding-top:20px; border-top:3px solid var(--accent); color:#555; font-size:0.92em;">
            <p><em>Human &times; AI Finance 2026 &mdash; UCLA Anderson School of Management</em></p>
            <p>Questions? Contact
              <a href="mailto:valentin.haddad@anderson.ucla.edu" style="color:var(--brand);">valentin.haddad@anderson.ucla.edu</a></p>
          </div>
        </div>
      `;
    } catch (err) {
      console.error("[DualSave] Submission error:", err);
      display.innerHTML = `
        <div class="submission-status submission-error">
          <div class="error-icon">&#10007;</div>
          <h2>Submission Error</h2>
          <p>There was a problem uploading your review. Your data has been saved locally in your browser as a backup.</p>
          <p>Please try refreshing this page and submitting again.</p>
          <p>If the problem persists, contact
            <a href="mailto:valentin.haddad@anderson.ucla.edu" style="color:var(--brand);">valentin.haddad@anderson.ucla.edu</a>
            with session ID: <code>${base}</code></p>
        </div>
      `;
    }
  }
});


// ─── Scale anchors HTML ──────────────────────────────────

const SCALE_ANCHORS_HTML = `
  <div class="scale-anchors">
    <strong>Rating Scale:</strong><br>
    <strong>10:</strong> Exceptional &mdash; top of the field<br>
    <strong>8&ndash;9:</strong> Strong &mdash; clear contribution, well above average<br>
    <strong>6&ndash;7:</strong> Good &mdash; solid with identifiable strengths<br>
    <strong>5:</strong> Average &mdash; has merit but significant limitations<br>
    <strong>3&ndash;4:</strong> Below average &mdash; meaningful problems<br>
    <strong>2:</strong> Weak &mdash; fundamental problems<br>
    <strong>1:</strong> Seriously flawed &mdash; no coherent contribution
  </div>
`;


// ─── 0. Consent + Identification ─────────────────────────
// Data keys: consent_agree, reviewer_name, reviewer_id, paper_id

const intro = {
  type: jsPsychSurvey,
  survey_json: {
    showQuestionNumbers: "off",
    completeText: "Begin Review",
    pages: [{
      elements: [
        {
          type: "html", name: "consent_info",
          html:
            '<div class="consent-header">' +
              '<div class="ch-center">' +
                '<img src="../ucla-anderson-logo-white.svg" alt="UCLA Anderson School of Management" class="ucla-logo" />' +
                '<h1>Paper Review</h1>' +
                '<h2>Human \u00d7 AI Finance 2026 \u2014 UCLA Anderson School of Management</h2>' +
              '</div>' +
              '<p>Thank you for serving on the scientific committee for the ' +
                'Human \u00d7 AI Finance Conference at UCLA Anderson. Your reviews are an essential part of ' +
                'evaluating the conference\u2019s paper selection process. ' +
                'Please submit <strong>one response per paper</strong>.</p>' +
              '<p style="margin-top:12px;">By continuing, you agree that your anonymized ratings ' +
                'may be used for academic research on AI-assisted writing evaluation.</p>' +
              '<p>You may withdraw at any time by emailing ' +
                '<a href="mailto:valentin.haddad@anderson.ucla.edu">valentin.haddad@anderson.ucla.edu</a>. ' +
                'See <a href="https://humanxaifinance.org" target="_blank">humanxaifinance.org</a> ' +
                'for full details about the conference.</p>' +
            '</div>'
        },
        {
          type: "checkbox", name: "consent_agree",
          title: " ",
          isRequired: true,
          choices: [
            "I agree to the terms above."
          ],
          validators: [{ type: "answercount", minCount: 1, text: "You must agree to continue." }]
        },
        {
          type: "text", name: "reviewer_name",
          title: "Your Name",
          isRequired: true
        },
        {
          type: "text", name: "reviewer_id",
          title: "Reviewer ID",
          isRequired: true
        },
        {
          type: "text", name: "paper_id",
          title: "Paper ID",
          isRequired: true
        }
      ]
    }]
  }
};


// ─── 1. Paper Rating ─────────────────────────────────────
// Data keys: innovation, methodology, relevance, rigor, overall

const ratings = {
  type: jsPsychSurvey,
  survey_json: {
    title: "Paper Rating",
    showQuestionNumbers: "off",
    completeText: "Submit Review",
    pages: [{
      elements: [
        { type: "html", name: "scale_legend", html: SCALE_ANCHORS_HTML },
        {
          type: "rating", name: "innovation",
          title: "Innovation \u2014 How novel are the ideas or concepts in this paper?",
          rateMin: 1, rateMax: 10,
          isRequired: true
        },
        {
          type: "rating", name: "methodology",
          title: "Methodology \u2014 How creative or original is the methodological approach?",
          rateMin: 1, rateMax: 10,
          isRequired: true
        },
        {
          type: "rating", name: "relevance",
          title: "Relevance \u2014 How interesting is this paper to a finance research audience?",
          rateMin: 1, rateMax: 10,
          isRequired: true
        },
        {
          type: "rating", name: "rigor",
          title: "Rigor \u2014 How accurate are the results and inferences, and how comprehensively are the research questions addressed?",
          rateMin: 1, rateMax: 10,
          isRequired: true
        },
        {
          type: "rating", name: "overall",
          title: "Overall \u2014 How would you rate this paper overall?",
          rateMin: 1, rateMax: 10,
          isRequired: true
        }
      ]
    }]
  }
};


// ─── 2. Thank You ────────────────────────────────────────

const thankYou = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="debrief">
      <h2>Thank You!</h2>
      <p>Your review has been recorded.</p>
      <p>If you have more papers to review, please <strong>reload this page</strong> to start the next review.</p>
      <p class="finalize-instruction">
        &#9660; Click the button below to finalize &#9660;</p>
      <div class="footer">
        <p><em>Human &times; AI Finance 2026 &mdash; UCLA Anderson School of Management</em></p>
        <p>Questions? Contact
          <a href="mailto:valentin.haddad@anderson.ucla.edu">valentin.haddad@anderson.ucla.edu</a></p>
      </div>
    </div>
  `,
  choices: ["Finalize Submission"]
};


// ─── Timeline & demo mode ────────────────────────────────

const timeline = [intro, ratings, thankYou];

if (DEMO) {
  console.log("%c DEMO MODE — all fields optional ", "background:#2774AE;color:#fff;padding:2px 6px;border-radius:3px;");
  function stripRequired(obj) {
    if (Array.isArray(obj)) { obj.forEach(stripRequired); return; }
    if (obj && typeof obj === "object") {
      delete obj.isRequired;
      delete obj.validators;
      Object.values(obj).forEach(stripRequired);
    }
  }
  timeline.forEach(t => { if (t.survey_json) stripRequired(t.survey_json); });
}

jsPsych.run(timeline);
</script>
</html>
