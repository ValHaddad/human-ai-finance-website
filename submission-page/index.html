<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paper Submission — Human \u00d7 AI Finance 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- jsPsych v8 core -->
  <script src="https://unpkg.com/jspsych@8.2.3/dist/index.browser.min.js"></script>
  <link  href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" />

  <!-- Plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-survey@4.0.0/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0/dist/index.browser.min.js"></script>
  <link  href="https://unpkg.com/@jspsych/plugin-survey@4.0.0/css/survey.css" rel="stylesheet" />

  <!--
    Single stylesheet — loaded AFTER survey.css so overrides win specificity.
    All SurveyJS customisations live here in one place.
  -->
  <style>
    /* ── Theme tokens (matched to website style.css) ──── */
    :root {
      --brand:       #2774AE;          /* UCLA Blue */
      --brand-dark:  #003B5C;          /* UCLA Darkest Blue */
      --brand-mid:   #005587;          /* UCLA Darker Blue */
      --accent:      #FFD100;          /* UCLA Gold */

    .sd-element, .sd-question, .sd-element--complex,

    .sd-question__content { overflow-x: auto !important; max-width: 100% !important; padding-top: 6px !important; }

    /* ── SurveyJS: section header ──────────────────────── */
    .sd-header { padding-bottom: 12px !important; }
    .sd-header__text { text-align: center !important; }

    /* ── SurveyJS: buttons ─────────────────────────────── */
    .sd-btn, .sd-navigation__complete-btn, .sd-btn--action {
      background: var(--accent) !important; color: var(--brand-dark) !important;

    .sd-action-bar { justify-content: center !important; }

    /* ── SurveyJS: question cards ──────────────────────── */
    .sd-element--with-frame {
      max-width: var(--card-max) !important;
      margin-left: auto !important; margin-right: auto !important;

    /* Radio-grid matrices (many columns) go wide */

    /* Dynamic input tables (authors, tools) stay card-width */
    .sd-element--with-frame.sd-question--table:has(.sd-matrixdynamic) {
      max-width: var(--card-max) !important;
    }
    .sd-element--complex.sd-element--with-frame > .sd-element__header {
      padding: 12px 0 !important; margin-bottom: 8px !important;
    }
    .sd-row { margin-top: 10px !important; }
    .sd-page > .sd-row:first-child { margin-top: 0 !important; }

    /* ── SurveyJS: radio / checkbox lists ──────────────── */
    .sd-selectbase { gap: 2px !important; }
    .sd-item { padding: 5px 0 !important; }

    /* ── SurveyJS: matrix tables ───────────────────────── */
    .sd-table { width: 100% !important; table-layout: auto !important; }
    .sd-matrix__cell--header {
      font-size: 0.78em !important; white-space: normal !important;
      word-break: break-word !important; text-align: center !important;
      padding: 6px 4px !important; font-weight: 700 !important;
    }
    .sd-matrix__cell { padding: 8px 4px !important; text-align: center !important; }
    .sd-matrix__cell:first-child {
      min-width: 150px !important; max-width: 200px !important;
      text-align: left !important; font-size: 0.88em !important;
      padding-left: 12px !important;

    /* ── Consent header ────────────────────────────────── */
    .consent-header {
      max-width: 680px; margin: 0 auto 8px; text-align: left; line-height: 1.5;
    }
    .consent-header .ch-center {
      text-align: center; margin-bottom: 24px;
      background: linear-gradient(160deg, var(--brand-dark) 0%, var(--brand-mid) 40%, var(--brand) 100%);
      padding: 32px 24px 24px; border-radius: var(--radius);
    }
    .consent-header .ucla-logo {
      height: 48px; width: auto; display: block; margin: 0 auto 16px;
    }
    .consent-header h1 { font-size: 1.55em; margin: 0 0 4px; letter-spacing: -0.01em; color: #fff; }
    .consent-header h2 { font-size: 1.1em; font-weight: 600; margin: 0; color: rgba(255,255,255,0.9); }
    .consent-header p { margin: 12px 0; }
    .consent-header a { color: var(--brand); }

    /* ── Consent checkboxes ─────────────────────────────── */
    [data-name="consent_agree"] .sd-question__header { display: none !important; }
    [data-name="consent_agree"] .sd-selectbase__label::after {
      content: " *"; color: #e60a3e; font-weight: 600;
    }

    /* ── "Not used for review" disclaimer banner ──────── */
    .review-disclaimer {
      background: #FFF8E1;
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 8px 16px; margin: 0 auto 4px;
      font-weight: 700; color: var(--brand-dark); font-size: 0.92em;
      text-align: center; max-width: var(--card-max);
    }

    /* ── Thank-you page ────────────────────────────────── */
    .debrief {
      max-width: 640px; margin: 0 auto; text-align: left;
      line-height: 1.65; padding: 40px 24px; font-family: var(--font);
    }
    .debrief h2 { text-align: center; font-size: 1.6em; margin-bottom: 24px; }
    .debrief .footer {
      margin-top: 36px; padding-top: 20px;
      border-top: 3px solid var(--accent); color: var(--text-muted); font-size: 0.92em;
    }
    .debrief a { color: var(--brand); }

    /* ── Red "Finalize Submission" button ─────────────── */
    .jspsych-btn.finalize-btn,
    .jspsych-btn {
      background: #C41E3A !important; color: #fff !important;
      font-size: 1.15rem !important; padding: 16px 40px !important;
      border-radius: 8px !important;
    }
    .jspsych-btn:hover { background: #A0182E !important; }
    .finalize-instruction {
      color: #C41E3A; font-weight: 700; font-size: 1.05em;
      text-align: center; margin-top: 28px;
    }

    /* ── Submitting / confirmation states ─────────────── */
    .submission-status {
      max-width: 640px; margin: 0 auto; text-align: center;
      padding: 60px 24px; font-family: var(--font); line-height: 1.7;
    }
    .submission-status h2 { font-size: 1.6em; margin-bottom: 16px; }
    .submission-status .paper-title { font-weight: 700; font-size: 1.1em; color: var(--brand-dark); }

    .submission-spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 4px solid #ddd; border-top-color: var(--brand);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .submission-success h2 { color: #2e7d32; }
    .submission-success .checkmark {
      font-size: 3em; color: #2e7d32; margin-bottom: 12px;
    }

    .submission-error h2 { color: #C41E3A; }
    .submission-error .error-icon {
      font-size: 3em; color: #C41E3A; margin-bottom: 12px;
    }
  </style>
</head>

<body></body>

<script>
/**
 * Human × AI Finance 2026 — Post-Submission Research Survey
 * Built with jsPsych v8 + @jspsych/plugin-survey (SurveyJS)
 *
 * Structure:
 *   0. Consent  (IRB consent items)
 *   1. About You
 *   2. Your Paper
 *   3. AI Tools & Usage
 *   4. AI Contribution by Research Task
 *   5. Your Workflow
 *   6. Collaboration & AI Coordination
 *   7. Quality Forecasts  (self-evaluation + comparisons)
 *   8. Paper Submission
 *   9. Thank You
 *
 * Data keys are documented inline with each section.
 * To add/remove a section, edit the corresponding variable and
 * update the timeline array at the bottom of this file.
 */

// ─── Demo mode ───────────────────────────────────────────
// Append ?demo to the URL to skip all required-field validation.
// e.g.  survey.html?demo
const DEMO = new URLSearchParams(window.location.search).has("demo");

// ─── Session ID (unique per page load) ──────────────────
const SESSION_ID = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// ─── Shared constants ────────────────────────────────────

/** Research tasks used in contribution & role matrices (Section 4). */
const RESEARCH_TASKS = [
  { value: "main_idea",       text: "Coming up with the main idea or contribution" },
  { value: "lit_review",      text: "Literature review" },
  { value: "data_collection", text: "Data collection or processing" },
  { value: "data_analysis",   text: "Data analysis or coding" },
  { value: "theorem_proofs",  text: "Theorem generation and proofs" },
  { value: "numerical_sim",   text: "Numerical analysis and simulation" },
  { value: "writing_editing", text: "Writing and editing" }
];

/** Evaluation dimensions matching the reviewer rubric (Section 6). */
const EVAL_DIMENSIONS = [
  { value: "conceptual_innovation",     text: "Conceptual Innovation \u2014 How novel are the ideas or concepts?" },
  { value: "methodological_originality", text: "Methodological Originality \u2014 How unique or creative is the methodology?" },
  { value: "relevance",                 text: "Relevance \u2014 How interesting is this to a finance research audience?" },
  { value: "rigor",                     text: "Rigor \u2014 How accurate are the results and inferences, and how comprehensively are the research questions addressed?" },
  { value: "overall",                   text: "Overall Evaluation \u2014 How would you rate this paper overall?" }
];

/** 1-7 column scale reused across rating matrices. */
const SCALE_1_7 = [
  { value: 1, text: "1 \u2013 Very weak" },
  { value: 2, text: "2" },
  { value: 3, text: "3" },
  { value: 4, text: "4" },
  { value: 5, text: "5" },
  { value: 6, text: "6" },
  { value: 7, text: "7 \u2013 Very strong" }
];


// ─── Upload configuration ────────────────────────────────
const DATAPIPE_EXPERIMENT_ID = "FSFCg5NIXOjk";
const DATAPIPE_DATA_URL = "https://pipe.jspsych.org/api/data/";
const DATAPIPE_BASE64_URL = "https://pipe.jspsych.org/api/base64/";

// *** IMPORTANT: Replace this URL after deploying the Google Apps Script ***
// See scripts/google-apps-script.js for setup instructions.
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwppcJYu4V8KEh727rsxwpDvcccUYwIGE9rRcvejHGCfzebUq5741PwgLdXaumAd0tT/exec";

const UPLOAD_TIMEOUT_MS = 300000; // 5 minutes

// ─── Retry helper ────────────────────────────────────────
async function withRetry(fn, maxRetries = 3) {
  for (let attempt = 0; attempt < maxRetries; attempt++) {
    try {
      return await fn();
    } catch (err) {
      console.warn(`[Upload] Attempt ${attempt + 1} failed:`, err.message);
      if (attempt === maxRetries - 1) throw err;
      await new Promise(r => setTimeout(r, 1000 * Math.pow(3, attempt)));
    }
  }
}

// ─── Fetch with timeout ──────────────────────────────────
function fetchWithTimeout(url, options, timeoutMs = UPLOAD_TIMEOUT_MS) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...options, signal: controller.signal })
    .finally(() => clearTimeout(timeout));
}

// ─── DataPipe helpers (with response validation) ─────────

async function sendToDataPipe(filename, data) {
  const response = await fetchWithTimeout(DATAPIPE_DATA_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "*/*" },
    body: JSON.stringify({
      experimentID: DATAPIPE_EXPERIMENT_ID,
      filename: filename,
      data: data,
    }),
  });
  if (!response.ok) throw new Error(`DataPipe HTTP ${response.status} for ${filename}`);
  const json = await response.json();
  if (json.error) throw new Error(`DataPipe error for ${filename}: ${json.error}`);
  console.log(`[DataPipe] ${filename} response:`, json);
  return json;
}

async function sendBase64ToDataPipe(filename, base64data) {
  const response = await fetchWithTimeout(DATAPIPE_BASE64_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "*/*" },
    body: JSON.stringify({
      experimentID: DATAPIPE_EXPERIMENT_ID,
      filename: filename,
      data: base64data,
    }),
  });
  if (!response.ok) throw new Error(`DataPipe HTTP ${response.status} for ${filename}`);
  const json = await response.json();
  if (json.error) throw new Error(`DataPipe error for ${filename}: ${json.error}`);
  console.log(`[DataPipe] ${filename} response:`, json);
  return json;
}

// ─── Google Drive helpers ────────────────────────────────

async function sendToGoogleDrive(filename, data, contentType) {
  const response = await fetchWithTimeout(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    redirect: "follow",
    body: JSON.stringify({
      action: "data",
      filename: filename,
      data: data,
      contentType: contentType || "application/json",
    }),
  });
  // GAS may return a redirect that resolves with type "cors" or "opaque"
  if (response.status === 0 || response.type === "opaque") {
    // Opaque response means we can't read it, but the request was sent
    console.log(`[GoogleDrive] ${filename}: opaque response (likely succeeded)`);
    return { success: true, filename };
  }
  if (!response.ok) throw new Error(`Google Drive HTTP ${response.status} for ${filename}`);
  const text = await response.text();
  try {
    const json = JSON.parse(text);
    if (!json.success) throw new Error(`Google Drive error for ${filename}: ${json.error || "unknown"}`);
    console.log(`[GoogleDrive] ${filename} response:`, json);
    return json;
  } catch (e) {
    // If we got a non-error HTTP response but can't parse JSON, treat as success
    console.log(`[GoogleDrive] ${filename}: non-JSON response, treating as success`);
    return { success: true, filename };
  }
}

async function sendBase64ToGoogleDrive(filename, base64data, mimeType) {
  const response = await fetchWithTimeout(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    redirect: "follow",
    body: JSON.stringify({
      action: "base64",
      filename: filename,
      data: base64data,
      mimeType: mimeType || "application/octet-stream",
    }),
  });
  if (response.status === 0 || response.type === "opaque") {
    console.log(`[GoogleDrive] ${filename}: opaque response (likely succeeded)`);
    return { success: true, filename };
  }
  if (!response.ok) throw new Error(`Google Drive HTTP ${response.status} for ${filename}`);
  const text = await response.text();
  try {
    const json = JSON.parse(text);
    if (!json.success) throw new Error(`Google Drive error for ${filename}: ${json.error || "unknown"}`);
    console.log(`[GoogleDrive] ${filename} response:`, json);
    return json;
  } catch (e) {
    console.log(`[GoogleDrive] ${filename}: non-JSON response, treating as success`);
    return { success: true, filename };
  }
}

// ─── Dual-save: send to both, succeed if either works ────

async function dualSaveData(filename, data, contentType) {
  const results = await Promise.allSettled([
    withRetry(() => sendToDataPipe(filename, data)),
    withRetry(() => sendToGoogleDrive(filename, data, contentType)),
  ]);
  const dpOk = results[0].status === "fulfilled";
  const gdOk = results[1].status === "fulfilled";
  if (!dpOk) console.error(`[DualSave] DataPipe failed for ${filename}:`, results[0].reason?.message);
  if (!gdOk) console.error(`[DualSave] GoogleDrive failed for ${filename}:`, results[1].reason?.message);
  if (!dpOk && !gdOk) throw new Error(`Both destinations failed for ${filename}`);
  return { filename, datapipe: dpOk, googledrive: gdOk };
}

async function dualSaveBase64(filename, base64data, mimeType) {
  const results = await Promise.allSettled([
    withRetry(() => sendBase64ToDataPipe(filename, base64data)),
    withRetry(() => sendBase64ToGoogleDrive(filename, base64data, mimeType)),
  ]);
  const dpOk = results[0].status === "fulfilled";
  const gdOk = results[1].status === "fulfilled";
  if (!dpOk) console.error(`[DualSave] DataPipe failed for ${filename}:`, results[0].reason?.message);
  if (!gdOk) console.error(`[DualSave] GoogleDrive failed for ${filename}:`, results[1].reason?.message);
  if (!dpOk && !gdOk) throw new Error(`Both destinations failed for ${filename}`);
  return { filename, datapipe: dpOk, googledrive: gdOk };
}

// ─── Progress UI helper ─────────────────────────────────

function updateProgress(display, items) {
  const rows = items.map(item => {
    const icon = item.status === "done" ? "&#10003;"
               : item.status === "error" ? "&#10007;"
               : '<span class="submission-spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;"></span>';
    const color = item.status === "done" ? "#2a7d2a"
               : item.status === "error" ? "#c0392b"
               : "#555";
    return `<div style="padding:6px 0;color:${color};">${icon} ${item.label}</div>`;
  }).join("");
  display.innerHTML = `
    <div class="submission-status">
      <h2>Submitting Your Data&hellip;</h2>
      <p>Please wait while we upload your submission. Do not close this tab.</p>
      <div style="text-align:left;max-width:420px;margin:20px auto;">${rows}</div>
    </div>
  `;
}


// ─── jsPsych init ────────────────────────────────────────

const jsPsych = initJsPsych({
  show_progress_bar: false,
  async on_finish() {
    const ts = new Date().toISOString().replace(/[:.]/g, "-");
    const base = `${ts}_${SESSION_ID}`;

    console.log("[DataPipe] Session:", base);
    console.log("[DataPipe] Trial count:", jsPsych.data.get().count());

    // Extract paper title and submitter name for confirmation screen
    const allData = jsPsych.data.get().values();
    let paperTitle = "";
    let submitterName = "";
    let authors = [];
    for (const trial of allData) {
      const resp = trial.response || {};
      if (resp.paper_title) paperTitle = resp.paper_title;
      if (resp.name) submitterName = resp.name;
      if (Array.isArray(resp.authors)) authors = resp.authors;
    }

    // ── localStorage backup (safety net) ──
    const backupKey = `hxai_submission_${SESSION_ID}`;
    try {
      localStorage.setItem(backupKey, JSON.stringify({
        session: base,
        timestamp: new Date().toISOString(),
        csv: jsPsych.data.get().csv(),
        json: jsPsych.data.get().json(),
        paperTitle, submitterName, authors,
      }));
      console.log("[Backup] Survey data saved to localStorage");
    } catch (e) {
      console.warn("[Backup] localStorage save failed:", e.message);
    }

    // ── Build progress tracker ──
    const display = document.querySelector('.jspsych-content');
    const progressItems = [
      { id: "csv", label: "Survey data (CSV)", status: "pending" },
      { id: "json", label: "Survey data (JSON)", status: "pending" },
    ];

    // Identify file uploads
    const fileUploads = [];
    for (const trial of allData) {
      const resp = trial.response || {};
      for (const key of ["paper_pdf", "paper_source"]) {
        const files = resp[key];
        if (Array.isArray(files)) {
          files.forEach((f) => {
            const raw = f.content.split(",")[1];
            const ext = f.name.split(".").pop();
            const mimeType = f.content.split(";")[0].split(":")[1] || "application/octet-stream";
            const fname = `${base}_${key}.${ext}`;
            const sizeMB = (raw.length * 0.75 / 1024 / 1024).toFixed(1);
            fileUploads.push({ key, fname, raw, mimeType, label: `${key === "paper_pdf" ? "Paper PDF" : "Source file"} (${sizeMB} MB)` });
            progressItems.push({ id: fname, label: `${key === "paper_pdf" ? "Paper PDF" : "Source file"} (${sizeMB} MB)`, status: "pending" });
          });
        }
      }
    }

    // Co-author manifest
    const COLAB_BASE = "https://humanxaifinance.org/submission-page/colab.html";
    const coauthors = authors
      .filter(a => a.author_name && a.author_email)
      .map(a => {
        const params = new URLSearchParams({
          paper: paperTitle,
          submitter: submitterName,
          session: SESSION_ID,
          coauthor: a.author_name
        });
        return {
          name: a.author_name,
          email: a.author_email,
          affiliation: a.author_affiliation || "",
          survey_link: `${COLAB_BASE}?${params.toString()}`
        };
      });

    if (coauthors.length > 0) {
      progressItems.push({ id: "coauthors", label: "Co-author manifest", status: "pending" });
    }

    updateProgress(display, progressItems);

    // ── Execute uploads with progress tracking ──
    const uploadResults = [];

    async function trackUpload(id, uploadFn) {
      const item = progressItems.find(p => p.id === id);
      item.status = "uploading";
      updateProgress(display, progressItems);
      try {
        const result = await uploadFn();
        item.status = "done";
        updateProgress(display, progressItems);
        uploadResults.push({ id, ...result, success: true });
      } catch (err) {
        item.status = "error";
        updateProgress(display, progressItems);
        uploadResults.push({ id, success: false, error: err.message });
        console.error(`[Upload] ${id} failed:`, err);
      }
    }

    // Run all uploads concurrently with individual tracking
    const uploadTasks = [
      trackUpload("csv", () => dualSaveData(`${base}.csv`, jsPsych.data.get().csv(), "text/csv")),
      trackUpload("json", () => dualSaveData(`${base}.json`, jsPsych.data.get().json(), "application/json")),
    ];

    for (const f of fileUploads) {
      uploadTasks.push(
        trackUpload(f.fname, () => dualSaveBase64(f.fname, f.raw, f.mimeType))
      );
    }

    if (coauthors.length > 0) {
      const manifest = JSON.stringify({
        session_id: SESSION_ID,
        paper_title: paperTitle,
        submitter: submitterName,
        coauthors: coauthors
      });
      uploadTasks.push(
        trackUpload("coauthors", () => dualSaveData(`${base}_coauthors.json`, manifest, "application/json"))
      );
    }

    await Promise.all(uploadTasks);

    // ── Show results ──
    const allOk = uploadResults.every(r => r.success);
    const anyOk = uploadResults.some(r => r.success);
    const failures = uploadResults.filter(r => !r.success);

    // Clear localStorage backup if at least text data was saved
    const textDataSaved = uploadResults.some(r => r.id === "csv" && r.success)
                       || uploadResults.some(r => r.id === "json" && r.success);
    if (textDataSaved) {
      try { localStorage.removeItem(backupKey); } catch (e) { /* ignore */ }
    }

    if (allOk) {
      const coauthorNote = coauthors.length > 0
        ? `<p style="margin-top:18px;">Co-author survey links have been generated for
           <strong>${coauthors.length}</strong> co-author${coauthors.length > 1 ? 's' : ''}.
           Please share the links with your co-authors via the email template provided to the submitting author.</p>`
        : '';

      display.innerHTML = `
        <div class="submission-status submission-success">
          <div class="checkmark">&#10003;</div>
          <h2>Submission Confirmed</h2>
          <p>Your submission has been successfully received.</p>
          ${paperTitle ? `<p class="paper-title">&ldquo;${paperTitle}&rdquo;</p>` : ''}
          ${submitterName ? `<p>Submitted by ${submitterName}</p>` : ''}
          ${coauthorNote}
          <p style="margin-top:28px; color:#555;">You may now close this tab.</p>
          <div style="margin-top:36px; padding-top:20px; border-top:3px solid var(--accent); color:#555; font-size:0.92em;">
            <p><em>Human &times; AI Finance 2026 &mdash; UCLA Anderson School of Management</em></p>
            <p>Questions? Contact
              <a href="mailto:valentin.haddad@anderson.ucla.edu" style="color:var(--brand);">valentin.haddad@anderson.ucla.edu</a></p>
          </div>
        </div>
      `;
    } else if (anyOk) {
      const failList = failures.map(f => `<li><strong>${f.id}</strong>: ${f.error}</li>`).join("");
      const savedNote = textDataSaved
        ? "<p><strong>Your survey responses were saved successfully.</strong> Only the items below had issues:</p>"
        : "<p>Some uploads encountered issues:</p>";

      display.innerHTML = `
        <div class="submission-status" style="border-left:4px solid #e67e22;">
          <div style="font-size:2em;color:#e67e22;">&#9888;</div>
          <h2>Partial Submission</h2>

          <ul style="text-align:left; max-width:480px; margin:16px auto;">${failList}</ul>

            with your session ID: <code>${base}</code></p>
          <p style="margin-top:28px; color:#555;">You may also try refreshing this page to resubmit.</p>
        </div>
      `;
    } else {
      display.innerHTML = `
        <div class="submission-status submission-error">
          <div class="error-icon">&#10007;</div>
          <h2>Submission Error</h2>
          <p>There was a problem uploading your submission. Your data has been saved locally in your browser as a backup.</p>

      if (trial.response && trial.response.authors) {
        const authors = trial.response.authors.filter(
          a => a.author_name && a.author_name.trim() !== ''

        return authors.length > 1;

  function stripRequired(obj) {
    if (Array.isArray(obj)) { obj.forEach(stripRequired); return; }
    if (obj && typeof obj === "object") {
      delete obj.isRequired;
      delete obj.validators;
      Object.values(obj).forEach(stripRequired);
    }
  }
  timeline.forEach(t => {
    if (t.survey_json) stripRequired(t.survey_json);

  });
}
