<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paper Submission — Human \u00d7 AI Finance 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- jsPsych v8 core -->
  <script src="https://unpkg.com/jspsych@8.2.3/dist/index.browser.min.js"></script>
  <link  href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" />

  <!-- Plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-survey@4.0.0/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0/dist/index.browser.min.js"></script>
  <link  href="https://unpkg.com/@jspsych/plugin-survey@4.0.0/css/survey.css" rel="stylesheet" />

  <!--
    Single stylesheet — loaded AFTER survey.css so overrides win specificity.
    All SurveyJS customisations live here in one place.
  -->
  <style>
    /* ── Theme tokens (matched to website style.css) ──── */
    :root {
      --brand:       #2774AE;          /* UCLA Blue */
      --brand-dark:  #003B5C;          /* UCLA Darkest Blue */
      --brand-mid:   #005587;          /* UCLA Darker Blue */
      --accent:      #FFD100;          /* UCLA Gold */
      --accent-dark: #E6BC00;          /* Gold hover */
      --text:        #1a1a1a;
      --text-muted:  #555;
      --radius:      6px;
      --card-max:    700px;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Base ──────────────────────────────────────────── */
    body { margin: 0; padding: 0; font-family: var(--font); color: var(--text); line-height: 1.7; font-size: 17px; }
    .jspsych-display-element { font-size: 17px; line-height: 1.7; }
    .jspsych-content-wrapper { text-align: center; }
    .jspsych-content { width: 100%; }

    /* ── jsPsych button (thank-you page) ───────────────── */
    .jspsych-btn {
      background: var(--accent) !important; color: var(--brand-dark) !important;
      border: none !important; border-radius: var(--radius) !important;
      padding: 12px 32px !important; font: 700 1rem var(--font) !important;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .jspsych-btn:hover { background: var(--accent-dark) !important; transform: translateY(-1px); }

    /* ── SurveyJS: layout ──────────────────────────────── */
    .sd-body.sd-body--static {
      max-width: 1100px !important;
      padding: 24px 24px 32px !important;
    }
    .sd-body__page, .sd-page, .sd-row, .sd-row > div,
    .sd-element, .sd-question, .sd-element--complex,
    .sd-question--table { max-width: 100% !important; }
    .sd-question__content { overflow-x: auto !important; max-width: 100% !important; padding-top: 6px !important; }

    /* ── SurveyJS: section header ──────────────────────── */
    .sd-header { padding-bottom: 12px !important; }
    .sd-header__text { text-align: center !important; }
    .sd-header__text h3 { font-family: var(--font); color: var(--brand); font-weight: 700; }
    .sd-description {
      text-align: center !important;
      max-width: var(--card-max); margin: 0 auto !important;
    }

    /* ── SurveyJS: buttons ─────────────────────────────── */
    .sd-btn, .sd-navigation__complete-btn, .sd-btn--action {
      background: var(--accent) !important; color: var(--brand-dark) !important;
      border-radius: var(--radius) !important;
      font-weight: 700 !important; padding: 12px 32px !important;
      font-size: 1rem !important; transition: background 0.2s, transform 0.1s;
    }
    .sd-btn:hover, .sd-navigation__complete-btn:hover { background: var(--accent-dark) !important; transform: translateY(-1px); }
    .sd-action-bar { justify-content: center !important; }

    /* ── SurveyJS: question cards ──────────────────────── */
    .sd-element--with-frame {
      max-width: var(--card-max) !important;
      margin-left: auto !important; margin-right: auto !important;
      padding: 18px 22px !important;
    }
    /* Radio-grid matrices (many columns) go wide */
    .sd-element--with-frame.sd-question--table { max-width: 100% !important; }
    /* Dynamic input tables (authors, tools) stay card-width */
    .sd-element--with-frame.sd-question--table:has(.sd-matrixdynamic) {
      max-width: var(--card-max) !important;
    }
    .sd-element--complex.sd-element--with-frame > .sd-element__header {
      padding: 12px 0 !important; margin-bottom: 8px !important;
    }
    .sd-row { margin-top: 10px !important; }
    .sd-page > .sd-row:first-child { margin-top: 0 !important; }

    /* ── SurveyJS: radio / checkbox lists ──────────────── */
    .sd-selectbase { gap: 2px !important; }
    .sd-item { padding: 5px 0 !important; }

    /* ── SurveyJS: matrix tables ───────────────────────── */
    .sd-table { width: 100% !important; table-layout: auto !important; }
    .sd-matrix__cell--header {
      font-size: 0.78em !important; white-space: normal !important;
      word-break: break-word !important; text-align: center !important;
      padding: 6px 4px !important;
    }
    .sd-matrix__cell { padding: 8px 4px !important; text-align: center !important; }
    .sd-matrix__cell:first-child {
      min-width: 150px !important; max-width: 200px !important;
      text-align: left !important; font-size: 0.88em !important;
      padding-left: 12px !important;
    }

    /* ── Consent header ────────────────────────────────── */
    .consent-header {
      max-width: 680px; margin: 0 auto 8px; text-align: left; line-height: 1.5;
    }
    .consent-header .ch-center {
      text-align: center; margin-bottom: 24px;
      background: linear-gradient(160deg, var(--brand-dark) 0%, var(--brand-mid) 40%, var(--brand) 100%);
      padding: 32px 24px 24px; border-radius: var(--radius);
    }
    .consent-header .ucla-logo {
      height: 48px; width: auto; display: block; margin: 0 auto 16px;
    }
    .consent-header h1 { font-size: 1.55em; margin: 0 0 4px; letter-spacing: -0.01em; color: #fff; }
    .consent-header h2 { font-size: 1.1em; font-weight: 600; margin: 0; color: rgba(255,255,255,0.9); }
    .consent-header p { margin: 12px 0; }
    .consent-header a { color: var(--brand); }

    /* ── Consent checkboxes ─────────────────────────────── */
    [data-name="consent_agree"] .sd-question__header { display: none !important; }
    [data-name="consent_agree"] .sd-selectbase__label::after {
      content: " *"; color: #e60a3e; font-weight: 600;
    }
    [data-name="publication_consent"] .sd-question__header { display: none !important; }

    /* ── "Not used for review" disclaimer banner ──────── */
    .review-disclaimer {
      background: #FFF8E1;
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 8px 16px; margin: 0 auto 4px;
      font-weight: 700; color: var(--brand-dark); font-size: 0.92em;
      text-align: center; max-width: var(--card-max);
    }

    /* ── Thank-you page ────────────────────────────────── */
    .debrief {
      max-width: 640px; margin: 0 auto; text-align: left;
      line-height: 1.65; padding: 40px 24px; font-family: var(--font);
    }
    .debrief h2 { text-align: center; font-size: 1.6em; margin-bottom: 24px; }
    .debrief .footer {
      margin-top: 36px; padding-top: 20px;
      border-top: 3px solid var(--accent); color: var(--text-muted); font-size: 0.92em;
    }
    .debrief a { color: var(--brand); }
  </style>
</head>

<body></body>

<script>
/**
 * Human × AI Finance 2026 — Post-Submission Research Survey
 * Built with jsPsych v8 + @jspsych/plugin-survey (SurveyJS)
 *
 * Structure:
 *   0. Consent  (IRB consent items)
 *   1. About You
 *   2. Your Paper
 *   3. AI Tools & Usage
 *   4. AI Contribution by Research Task
 *   5. Your Workflow
 *   6. Collaboration & AI Coordination
 *   7. Quality Forecasts  (self-evaluation + comparisons)
 *   8. Paper Submission
 *   9. Thank You
 *
 * Data keys are documented inline with each section.
 * To add/remove a section, edit the corresponding variable and
 * update the timeline array at the bottom of this file.
 */

// ─── Demo mode ───────────────────────────────────────────
// Append ?demo to the URL to skip all required-field validation.
// e.g.  survey.html?demo
const DEMO = new URLSearchParams(window.location.search).has("demo");

// ─── Session ID (unique per page load) ──────────────────
const SESSION_ID = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// ─── Shared constants ────────────────────────────────────

/** Research tasks used in contribution & role matrices (Section 4). */
const RESEARCH_TASKS = [
  { value: "main_idea",       text: "Coming up with the main idea or contribution" },
  { value: "lit_review",      text: "Literature review" },
  { value: "data_collection", text: "Data collection or processing" },
  { value: "data_analysis",   text: "Data analysis or coding" },
  { value: "theorem_proofs",  text: "Theorem generation and proofs" },
  { value: "numerical_sim",   text: "Numerical analysis and simulation" },
  { value: "writing_editing", text: "Writing and editing" }
];

/** Evaluation dimensions matching the reviewer rubric (Section 6). */
const EVAL_DIMENSIONS = [
  { value: "conceptual_innovation",     text: "Conceptual Innovation \u2014 How novel are the ideas or theoretical contributions?" },
  { value: "methodological_originality", text: "Methodological Originality \u2014 How unique or creative is the methodology?" },
  { value: "relevance",                 text: "Relevance \u2014 How interesting is this to a finance research audience?" },
  { value: "rigor",                     text: "Rigor \u2014 How accurate are the results and inferences, and how comprehensively are the research questions addressed?" }
];

/** 1-7 column scale reused across rating matrices. */
const SCALE_1_7 = [
  { value: 1, text: "1 \u2013 Very weak" },
  { value: 2, text: "2" },
  { value: 3, text: "3" },
  { value: 4, text: "4" },
  { value: 5, text: "5" },
  { value: 6, text: "6" },
  { value: 7, text: "7 \u2013 Very strong" }
];


// ─── DataPipe helpers ────────────────────────────────────

function sendToDataPipe(filename, data) {
  return fetch("https://pipe.jspsych.org/api/data/", {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "*/*" },
    body: JSON.stringify({
      experimentID: "G4cMGtgbY7YU",
      filename: filename,
      data: data,
    }),
  });
}

function sendBase64ToDataPipe(filename, base64data) {
  return fetch("https://pipe.jspsych.org/api/base64/", {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "*/*" },
    body: JSON.stringify({
      experimentID: "G4cMGtgbY7YU",
      filename: filename,
      data: base64data,
    }),
  });
}


// ─── jsPsych init ────────────────────────────────────────

const jsPsych = initJsPsych({
  show_progress_bar: false,
  on_finish() {
    const ts = new Date().toISOString().replace(/[:.]/g, "-");
    const base = `${ts}_${SESSION_ID}`;

    console.log("[DataPipe] Session:", base);
    console.log("[DataPipe] Trial count:", jsPsych.data.get().count());
    console.log("[DataPipe] All data:", jsPsych.data.get().values());

    // Survey responses (CSV + JSON)
    sendToDataPipe(`${base}.csv`, jsPsych.data.get().csv())
      .then(r => r.json()).then(j => console.log("[DataPipe] CSV response:", j))
      .catch(e => console.error("[DataPipe] CSV error:", e));

    sendToDataPipe(`${base}.json`, jsPsych.data.get().json())
      .then(r => r.json()).then(j => console.log("[DataPipe] JSON response:", j))
      .catch(e => console.error("[DataPipe] JSON error:", e));

    // Uploaded files (paper_pdf, paper_source)
    const allData = jsPsych.data.get().values();
    for (const trial of allData) {
      const resp = trial.response || {};
      for (const key of ["paper_pdf", "paper_source"]) {
        const files = resp[key];
        if (Array.isArray(files)) {
          files.forEach((f) => {
            console.log(`[DataPipe] Uploading file: ${key} -> ${f.name}`);
            const raw = f.content.split(",")[1];
            const ext = f.name.split(".").pop();
            sendBase64ToDataPipe(`${base}_${key}.${ext}`, raw)
              .then(r => r.json()).then(j => console.log(`[DataPipe] ${key} response:`, j))
              .catch(e => console.error(`[DataPipe] ${key} error:`, e));
          });
        }
      }
    }

    jsPsych.data.displayData("json");
  }
});


// ─── 0. Consent ──────────────────────────────────────────
// Data keys: consent_agree, publication_consent

const consent = {
  type: jsPsychSurvey,
  survey_json: {
    showQuestionNumbers: "off",
    completeText: "Begin Paper Submission",
    pages: [{
      elements: [
        {
          type: "html", name: "consent_info",
          html:
            '<div class="consent-header">' +
              '<div class="ch-center">' +
                '<img src="../ucla-anderson-logo-white.svg" alt="UCLA Anderson School of Management" class="ucla-logo" />' +
                '<h1>Paper Submission</h1>' +
                '<h2>Human \u00d7 AI Finance 2026 \u2014 UCLA Anderson School of Management</h2>' +
              '</div>' +
              '<p>Thank you for submitting your work to Human \u00d7 AI Finance 2026! ' +
                'Before uploading your paper, we\u2019d like to ask you a few brief questions ' +
                'about your experience writing with AI. This should take about ' +
                '<strong>10 minutes</strong>.</p>' +
              '<div class="review-disclaimer" style="display:block; text-align:center; margin:16px 0;">' +
                'Your survey responses will <strong>not</strong> affect your paper\u2019s evaluation or score.' +
              '</div>' +
              '<p style="margin-top:12px;">By continuing, you agree that:</p>' +
              '<ul style="margin:8px 0 8px 20px; line-height:1.6;">' +
                '<li>Your paper will be evaluated by AI systems. No human is involved in the selection decision.</li>' +
                '<li>Anonymized survey data may be used for academic research on AI-assisted writing.</li>' +
              '</ul>' +
              '<p>You may withdraw at any time by emailing ' +
                '<a href="mailto:vhaddad+humanxai@g.ucla.edu">vhaddad+humanxai@g.ucla.edu</a>. ' +
                'See <a href="https://humanxaifinance.org" target="_blank">humanxaifinance.org</a> ' +
                'for full details about the conference.</p>' +
            '</div>'
        },
        {
          type: "checkbox", name: "consent_agree",
          title: " ",
          isRequired: true,
          choices: [
            "I agree to the terms above."
          ],
          validators: [{ type: "answercount", minCount: 1, text: "You must agree to continue." }]
        },
        {
          type: "checkbox", name: "publication_consent",
          title: " ",
          isRequired: false,
          choices: [
            "I agree that my paper, AI reviewer comments, and scores may be published online."
          ]
        }
      ]
    }]
  }
};


// ─── 1. About You ────────────────────────────────────────
// Data keys: name, email, occupation_title, affiliation,
//   primary_field, programming_proficiency, paper_writing_experience,
//   google_scholar_url

const aboutYou = {
  type: jsPsychSurvey,
  survey_json: {
    title: "About You",
    showQuestionNumbers: "off",
    completeText: "Next",
    pages: [{
      elements: [
        { type: "html", name: "about_disclaimer", html: '<div class="review-disclaimer">Your responses will not affect your paper\u2019s evaluation or score.</div>' },
        { type: "text", name: "name", title: "Full name", isRequired: true },
        {
          type: "text", name: "email", title: "Email address",
          inputType: "email", isRequired: true,
          validators: [{ type: "email" }]
        },
        {
          type: "text", name: "occupation_title",
          title: "Occupation and title (e.g., Assistant Professor, PhD Student, Research Analyst)",
          isRequired: true
        },
        { type: "text", name: "affiliation", title: "Institutional affiliation", isRequired: true },
        {
          type: "dropdown", name: "primary_field",
          title: "Field of primary expertise", isRequired: true,
          choices: [
            "Finance", "Economics", "Computer Science",
            "Statistics / Data Science", "Accounting", "Management"
          ],
          showOtherItem: true, otherText: "Other"
        },
        {
          type: "radiogroup", name: "programming_proficiency",
          title: "Programming proficiency", isRequired: true,
          choices: [
            { value: 1, text: "Never written code" },
            { value: 2, text: "Occasional coder, copy-paste fluent" },
            { value: 3, text: "Comfortable with Python or R" },
            { value: 4, text: "Fluent programmer, writes packages" },
            { value: 5, text: "Software engineer or equivalent" }
          ]
        },
        {
          type: "radiogroup", name: "paper_writing_experience",
          title: "Paper writing experience", isRequired: true,
          choices: [
            { value: 1, text: "Never written an academic paper" },
            { value: 2, text: "Written a few papers for coursework" },
            { value: 3, text: "Published or submitted to journals" },
            { value: 4, text: "Multiple publications, also referees" },
            { value: 5, text: "Senior scholar, extensive record" }
          ]
        },
        {
          type: "text", name: "google_scholar_url",
          title: "Google Scholar profile URL (optional)",
          inputType: "url",
          placeholder: "https://scholar.google.com/citations?user=..."
        }
      ]
    }]
  }
};


// ─── 2. Your Paper ───────────────────────────────────────
// Data keys: paper_title, authors (array), start_date_confirm

const yourPaper = {
  type: jsPsychSurvey,
  survey_json: {
    title: "Your Paper",
    showQuestionNumbers: "off",
    completeText: "Next",
    pages: [{
      elements: [
        { type: "html", name: "paper_disclaimer", html: '<div class="review-disclaimer">Your responses will not affect your paper\u2019s evaluation or score.</div>' },
        { type: "text", name: "paper_title", title: "Paper title", isRequired: true },
        {
          type: "matrixdynamic", name: "authors",
          title: "All authors (add rows as needed)",
          isRequired: true,
          columns: [
            { name: "author_name",        title: "Name",        cellType: "text", isRequired: true },
            { name: "author_affiliation", title: "Affiliation", cellType: "text", isRequired: true },
            { name: "author_email",       title: "Email",       cellType: "text" }
          ],
          rowCount: 1,
          addRowText: "Add Author",
          removeRowText: "Remove"
        },
        {
          type: "boolean", name: "start_date_confirm",
          title: "Do you confirm that formal work on this paper began on or after February 18, 2026?",
          isRequired: true, labelTrue: "Yes", labelFalse: "No"
        }
      ]
    }]
  }
};

  timeline: [collaboration],
  conditional_function: function() {
    const trials = jsPsych.data.get().filter({trial_type: 'survey'}).values();
    for (const trial of trials) {
      if (trial.response && trial.response.authors) {
        const authors = trial.response.authors.filter(
          a => a.author_name && a.author_name.trim() !== ''
        );
        return authors.length > 1;
      }
    }
    return true; // show by default if author data not found
  }
};

  function stripRequired(obj) {
    if (Array.isArray(obj)) { obj.forEach(stripRequired); return; }
    if (obj && typeof obj === "object") {
      delete obj.isRequired;
      delete obj.validators;
      Object.values(obj).forEach(stripRequired);
    }
  }
  timeline.forEach(t => {
    if (t.survey_json) stripRequired(t.survey_json);

  });
}
